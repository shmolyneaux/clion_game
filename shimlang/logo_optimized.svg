<svg width="1000" height="1000" viewBox="0 0 1000 1000" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Shimlang logo</title>
  <desc id="desc">A modern S-shaped mark built from two stacked fast-forward triangles in a purple to violet gradient.</desc>
  <defs>
    <linearGradient id="shimlang-gradient" x1="164" y1="104" x2="811" y2="899" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#B987FF"/>
      <stop offset="0.44" stop-color="#8B5CF6"/>
      <stop offset="1" stop-color="#5B2BE0"/>
    </linearGradient>
    <linearGradient id="shimlang-highlight" x1="230" y1="142" x2="644" y2="608" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.46"/>
      <stop offset="0.52" stop-color="#FFFFFF" stop-opacity="0.13"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <filter id="soft-shadow" x="80" y="72" width="840" height="856" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="32" stdDeviation="28" flood-color="#25104D" flood-opacity="0.22"/>
    </filter>
  </defs>

  <g filter="url(#soft-shadow)">
    <path d="M190 112L800 392L529 545L810 640L192 900L220 636L506 507L222 384L190 112Z" fill="url(#shimlang-gradient)"/>
    <path d="M190 112L800 392L529 545L810 640L192 900L220 636L506 507L222 384L190 112Z" fill="url(#shimlang-highlight)"/>
  </g>

  <path d="M281 238L604 386L431 481L270 411L281 238Z" fill="#070B12" fill-opacity="0.92"/>
  <path d="M293 621L461 545L637 605L286 752L293 621Z" fill="#070B12" fill-opacity="0.92"/>

  <path d="M260 156L742 378" stroke="#D9C4FF" stroke-width="24" stroke-linecap="round" stroke-opacity="0.32"/>
  <path d="M236 838L755 619" stroke="#2B126B" stroke-width="28" stroke-linecap="round" stroke-opacity="0.18"/>
</svg>
