<!doctype html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no"/>
    <title>Dear ImGui Emscripten example</title>
    <style>
        body { margin: 0; background-color: black }
        .emscripten {
            position: absolute;
            top: 0px; left: 0px;
            margin: 0px; border: 0;
            width: 100%; height: 100%;
            overflow: hidden; display: block;
            image-rendering: pixelated;
            -ms-interpolation-mode: nearest-neighbor;
        }
    </style>
  </head>
  <body>
    <canvas class="emscripten" id="canvas" oncontextmenu="event.preventDefault()"></canvas>
    <script type='text/javascript'>
      var Module = {
        preRun: [function() {
          // Fetch game.shm from the server and write it into the virtual FS
          // before main() starts, so Rust can read it with std::fs.
          addRunDependency('fetch-game-shm');
          fetch('game.shm')
            .then(function(r) { return r.arrayBuffer(); })
            .then(function(buf) {
              FS.writeFile('game.shm', new Uint8Array(buf));
              removeRunDependency('fetch-game-shm');
            })
            .catch(function(err) {
              console.warn('Could not load game.shm:', err);
              removeRunDependency('fetch-game-shm');
            });
        }],
        postRun: [],
        print: function(text) {
          console.log(Array.prototype.slice.call(arguments).join(' '));
        },
        printErr: function(text) {
          console.error(Array.prototype.slice.call(arguments).join(' '));
        },
        canvas: (function() {
          return document.getElementById('canvas');
        })(),
        setStatus: function(text) {
          console.log("status: " + text);
        },
        monitorRunDependencies: function(left) {}
      };
      window.onerror = function() {
        console.log("onerror: " + event);
      };
    </script>
    {{{ SCRIPT }}}
  </body>
</html>
