<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="grad" x1="0.2" y1="0" x2="0.4" y2="1">
      <stop offset="0" stop-color="#f4a8ff"/>
      <stop offset="0.5" stop-color="#c95cf2"/>
      <stop offset="1" stop-color="#6a1fd0"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g fill="none" stroke="url(#grad)" stroke-width="24" stroke-linejoin="miter" stroke-linecap="butt" filter="url(#glow)">
    <!-- outer big triangle pointing right -->
    <path d="M 295 165 L 760 515 L 310 805 Z"/>
    <!-- upper right-pointing arrow with stepped tip -->
    <path d="M 300 200 L 560 348 L 600 340 L 650 362 L 330 540"/>
    <!-- lower right-pointing broken arrow -->
    <path d="M 320 690 L 470 700"/>
    <path d="M 500 660 L 555 638"/>
  </g>
</svg>
